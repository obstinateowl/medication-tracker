name: Medication Tracker
version: "1.4.0"
slug: medication_tracker
description: >-
  Household medication tracking — log doses, interval timers, max per day,
  and per-profile quick buttons. Connects to MariaDB on your Home Assistant server.
  Publishes MQTT state for Home Assistant automations and notifications.
url: https://github.com/obstinateowl/medication-tracker
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:pill
panel_title: Medications
options:
  db_host: "127.0.0.1"
  db_port: 3306
  db_user: medtracker
  db_password: ""
  db_name: medication_tracker
  mqtt_enabled: true
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic_prefix: "medication_tracker"
schema:
  db_host: str
  db_port: port
  db_user: str
  db_password: password
  db_name: str
  mqtt_enabled: bool
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str
  mqtt_password: password
  mqtt_topic_prefix: str
