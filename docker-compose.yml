# Standalone production deploy (not Home Assistant).
# Copy .env.example to .env and configure before starting.

services:
  medication-tracker:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: medication-tracker
    restart: unless-stopped
    ports:
      - "${PORT:-8099}:8099"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SERVE_STATIC: "true"
      HOST: 0.0.0.0
      PORT: "8099"
